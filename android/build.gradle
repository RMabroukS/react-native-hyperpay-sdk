buildscript {
    if (project == rootProject) {
        repositories {
            google()
            mavenCentral()
              flatDir {
                 dirs 'libs'
              }
            // jcenter()
        }

        dependencies {
            classpath 'com.android.tools.build:gradle:3.5.3'
        }
    }
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    compileSdkVersion safeExtGet('HyperPay_compileSdkVersion', 31)
    defaultConfig {
        minSdkVersion safeExtGet('HyperPay_minSdkVersion', 21)
        targetSdkVersion safeExtGet('HyperPay_targetSdkVersion', 29)
        versionCode 1
        versionName "1.0"

    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lintOptions {
        disable 'GradleCompatible'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories {
    mavenLocal()
    maven {
        // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
        url("$rootDir/../node_modules/react-native/android")
    }
    google()
    mavenCentral()
      flatDir {
        dirs 'libs'
    }
    // jcenter()
}

dependencies {

  // compileOnly: the host app provides oppwa.mobile + ipworks3ds at runtime via its own
  // implementation files(...) deps. Using compileOnly here avoids duplicate-class conflicts.
  compileOnly files('libs/ipworks3ds_sdk_9625.aar')
  compileOnly files('libs/oppwa.mobile-7.11.0-release.aar')
  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "androidx.recyclerview:recyclerview:1.4.0"
  implementation "androidx.browser:browser:1.8.0"
  implementation "androidx.fragment:fragment-ktx:1.8.6"
  implementation "androidx.constraintlayout:constraintlayout:2.2.1"
  implementation "androidx.webkit:webkit:1.13.0"
  implementation "com.google.android.material:material:1.12.0"
  implementation "com.google.code.gson:gson:2.11.0"
  implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7"


  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"  // From node_modules

}